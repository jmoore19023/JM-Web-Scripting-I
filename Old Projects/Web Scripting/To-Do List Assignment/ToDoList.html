<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
    }

    #error {
      color: red;
      display: none;
    }

    input, select, button {
      padding: 6px;
      margin: 4px 0;
      font-size: 1rem;
    }

    #task-input {
      width: 60%;
    }

    li {
      margin: 8px 0;
      list-style: none;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .filters {
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <h1>To-Do List</h1>
  <p id="counter">0 active tasks</p>

  <!-- Add task form -->
  <input type="text" id="task-input" placeholder="Enter a task...">
  <select id="tag-select">
    <option value="">No tag</option>
    <option value="school">School</option>
    <option value="work">Work</option>
    <option value="personal">Personal</option>
  </select>
  <button onclick="addTask()">Add</button>
  <p id="error">Please enter a task name.</p>

  <!-- Filters -->
  <div class="filters">
    <strong>Show:</strong>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('completed')">Completed</button>

    <br><br>
    <strong>Tag:</strong>
    <button onclick="setTag('')">All</button>
    <button onclick="setTag('school')">School</button>
    <button onclick="setTag('work')">Work</button>
    <button onclick="setTag('personal')">Personal</button>
  </div>

  <ul id="task-list"></ul>

  <script>
    // Load tasks from localStorage, or start with empty array
    var tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    var currentFilter = "all";
    var currentTag = "";

    function addTask() {
      var input = document.getElementById("task-input");
      var tagSelect = document.getElementById("tag-select");
      var error = document.getElementById("error");
      var text = input.value.trim();

      // Validation
      if (text === "") {
        error.style.display = "block";
        return;
      }

      error.style.display = "none";

      // Create task object
      var task = {
        id: Date.now(),
        text: text,
        tag: tagSelect.value,
        done: false
      };

      tasks.push(task);
      saveAndRender();

      // Clear the form
      input.value = "";
      tagSelect.value = "";
    }

    function toggleDone(id) {
      for (var i = 0; i < tasks.length; i++) {
        if (tasks[i].id === id) {
          tasks[i].done = !tasks[i].done;
        }
      }
      saveAndRender();
    }

    function deleteTask(id) {
      var newTasks = [];
      for (var i = 0; i < tasks.length; i++) {
        if (tasks[i].id !== id) {
          newTasks.push(tasks[i]);
        }
      }
      tasks = newTasks;
      saveAndRender();
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderTasks();
    }

    function setTag(tag) {
      currentTag = tag;
      renderTasks();
    }

    function saveAndRender() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    }

    function renderTasks() {
      var list = document.getElementById("task-list");
      var counter = document.getElementById("counter");
      list.innerHTML = "";

      // Count active tasks
      var activeCount = 0;
      for (var i = 0; i < tasks.length; i++) {
        if (!tasks[i].done) activeCount++;
      }
      counter.textContent = activeCount + " active tasks";

      // Loop through tasks and display matching ones
      for (var i = 0; i < tasks.length; i++) {
        var task = tasks[i];

        // Check status filter
        if (currentFilter === "active" && task.done) continue;
        if (currentFilter === "completed" && !task.done) continue;

        // Check tag filter
        if (currentTag !== "" && task.tag !== currentTag) continue;

        // Build the list item
        var li = document.createElement("li");

        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.onclick = (function(id) {
          return function() { toggleDone(id); };
        })(task.id);

        var label = document.createElement("span");
        label.textContent = task.text;
        if (task.tag) label.textContent += " [" + task.tag + "]";
        if (task.done) label.className = "done";

        var deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = (function(id) {
          return function() { deleteTask(id); };
        })(task.id);

        li.appendChild(checkbox);
        li.appendChild(label);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      }
    }

    // Render on page load
    renderTasks();
  </script>

</body>
</html>
